<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESAPARECIDO // Memorial</title>
    <style>
        body { 
            margin: 0; overflow: hidden; background-color: #010101; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            cursor: crosshair; user-select: none;
        }
        
        /* Pantalla de Carga Museográfica */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #010101; color: #fff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            transition: opacity 1.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .loader-text { letter-spacing: 6px; font-size: 10px; text-transform: uppercase; margin-bottom: 25px; color: #666; font-weight: 400; }
        #progress-bar { width: 160px; height: 1px; background: #111; position: relative; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: #ddd; transition: width 0.2s ease; }

        /* Placa Izquierda: Título de la Obra */
        #ui-overlay {
            position: absolute; bottom: 45px; left: 45px; z-index: 10;
            color: #fff; pointer-events: none; opacity: 0;
            transition: opacity 2.5s ease 1s;
        }
        h1 { font-size: 15px; margin: 0; font-weight: 300; letter-spacing: 8px; text-transform: uppercase; }
        p { font-size: 9px; margin: 8px 0 0; color: #555; letter-spacing: 2px; text-transform: uppercase; }

        /* Placa Derecha: Instrucciones mínimas de navegación */
        #nav-hint {
            position: absolute; bottom: 45px; right: 45px; z-index: 10;
            display: flex; gap: 25px; pointer-events: none; opacity: 0;
            transition: opacity 2.5s ease 4s; /* Se revela casi al terminar de armarse */
        }
        .hint-item { display: flex; align-items: center; gap: 8px; color: #444; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; }
        .hint-dot { width: 3px; height: 3px; border-radius: 50%; background: #333; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-text">Invocando memoria...</div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <div id="ui-overlay">
        <h1>DESAPARECIDO</h1>
        <p>130,000 ausencias presentes</p>
    </div>

    <div id="nav-hint">
        <div class="hint-item"><span class="hint-dot"></span> Arrastrar para órbita</div>
        <div class="hint-item"><span class="hint-dot"></span> Scroll para acercar</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>

    <script>
        // ===================================================
        // DESAPARECIDO // ENGINE v3.1 (POETIC ASSEMBLY CORE)
        // ===================================================
        
        let scene, camera, renderer, controls, particleSystem, shaderMaterial, raycaster, mouseMesh;
        const progressFill = document.getElementById('progress-fill');
        const mouse = new THREE.Vector2(-1000, -1000);
        
        let assemblyStartTime = null;
        const ASSEMBLY_DURATION = 10000.0; // 10 Segundos de precipitación poética
        let isEngineReady = false;

        // Rutas estrictas para servidor remoto (GitHub Pages)
        const ASSETS = {
            model: './assets/jersey.obj', 
            texture: './assets/textura.jpg'
        };

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x010101, 0.005);

            camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 155);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.03; 
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.18; 
            controls.enablePan = false;
            controls.maxDistance = 240;
            controls.minDistance = 70;

            raycaster = new THREE.Raycaster();

            window.addEventListener('mousemove', onMouseMove, false);
            window.addEventListener('resize', onResize, false);

            loadAssets();
            requestAnimationFrame(animate); 
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function loadAssets() {
            const manager = new THREE.LoadingManager();
            const textureLoader = new THREE.TextureLoader(manager);
            const objLoader = new THREE.OBJLoader(manager);

            let tex, obj;

            manager.onProgress = (u, loaded, total) => {
                progressFill.style.width = (loaded / total * 100) + '%';
            };

            manager.onLoad = () => {
                const loaderScreen = document.getElementById('loading-screen');
                loaderScreen.style.opacity = '0';
                setTimeout(() => {
                    loaderScreen.remove();
                    document.getElementById('ui-overlay').style.opacity = '1';
                    document.getElementById('nav-hint').style.opacity = '1';
                }, 1800);

                setupSceneGeometries(obj, tex);
                isEngineReady = true; 
            };

            textureLoader.load(ASSETS.texture, (t) => tex = t);
            objLoader.load(ASSETS.model, (o) => obj = o);
        }

        function setupSceneGeometries(obj, tex) {
            let rawGeometry;
            obj.traverse(child => {
                if (child.isMesh) {
                    rawGeometry = child.geometry.clone();
                }
            });

            // 1. CENTRADO MILIMÉTRICO ABSOLUTO
            rawGeometry.center(); 

            // 2. Normalización matemática a escala áurea del viewport
            rawGeometry.computeBoundingBox();
            const size = rawGeometry.boundingBox.getSize(new THREE.Vector3());
            const scale = 72.0 / Math.max(size.x, size.y, size.z);
            rawGeometry.scale(scale, scale, scale);
            rawGeometry.computeVertexNormals();

            mouseMesh = new THREE.Mesh(rawGeometry, new THREE.MeshBasicMaterial({visible:false}));
            scene.add(mouseMesh);

            buildPoeticShader(tex);
            generateCloud(rawGeometry);
        }

        function buildPoeticShader(tex) {
            shaderMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTexture: { value: tex },
                    uLight: { value: new THREE.Vector3(1, 1, 1) },
                    uMousePos: { value: new THREE.Vector3(9999, 9999, 9999) },
                    uGlobalTime: { value: 0.0 } 
                },
                vertexShader: `
                    attribute vec3 normalMap;
                    attribute vec3 aVoidPos;
                    attribute float aBirthTime; 
                    
                    varying vec3 vNormal;
                    varying vec2 vUv;
                    varying vec3 vWorldPos;
                    varying float vMaterialization;

                    uniform float uGlobalTime;

                    void main() {
                        vNormal = normalMatrix * normalMap;
                        vUv = uv;

                        // Algoritmo de Condensación Poética:
                        // La partícula viaja del vacío al jersey tomando el 15% de la ventana temporal
                        float travelWindow = 0.15;
                        float progress = clamp((uGlobalTime - aBirthTime) / travelWindow, 0.0, 1.0);
                        
                        // Desaceleración orgánica (Cubic Ease Out)
                        float ease = 1.0 - pow(1.0 - progress, 3.0);

                        vec3 currentPos = mix(aVoidPos, position, ease);

                        vec4 worldPos = modelMatrix * vec4(currentPos, 1.0);
                        vWorldPos = worldPos.xyz;
                        vMaterialization = progress; 

                        gl_PointSize = 1.35;
                        gl_Position = projectionMatrix * viewMatrix * worldPos;
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    varying vec2 vUv;
                    varying vec3 vWorldPos;
                    varying float vMaterialization;

                    uniform sampler2D uTexture;
                    uniform vec3 uLight;
                    uniform vec3 uMousePos;

                    void main() {
                        // Ocultar hasta que el cronómetro alcance su hora de nacimiento
                        if(vMaterialization <= 0.001) discard;

                        float light = max(dot(normalize(vNormal), normalize(uLight)), 0.0);
                        float tex = texture2D(uTexture, vUv).r;

                        float dist = distance(vWorldPos, uMousePos);
                        float hoverGlow = smoothstep(22.0, 0.0, dist) * 2.8;

                        float alpha = (pow(light, 1.6) + hoverGlow) * tex * vMaterialization;

                        if(alpha < 0.05) discard;

                        gl_FragColor = vec4(1.0, 0.98, 0.94, alpha);
                    }
                `,
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
            });
        }

        function generateCloud(geo) {
            const count = 130000;
            const pGeo = new THREE.BufferGeometry();

            const pos = new Float32Array(count * 3);
            const voidPos = new Float32Array(count * 3);
            const norm = new Float32Array(count * 3);
            const uvs = new Float32Array(count * 2);
            const birth = new Float32Array(count);

            const sPos = geo.attributes.position;
            const sNorm = geo.attributes.normal;
            const sUv = geo.attributes.uv;

            for(let i=0; i<count; i++) {
                const idx = Math.floor(Math.random() * sPos.count);

                pos[i*3] = sPos.getX(idx);
                pos[i*3+1] = sPos.getY(idx);
                pos[i*3+2] = sPos.getZ(idx);

                // Nube de origen dispersa en el vacío profundo
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const r = 190 + Math.random() * 90;

                voidPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
                voidPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                voidPos[i*3+2] = r * Math.cos(phi);

                norm[i*3] = sNorm.getX(idx);
                norm[i*3+1] = sNorm.getY(idx);
                norm[i*3+2] = sNorm.getZ(idx);

                uvs[i*2] = sUv.getX(idx);
                uvs[i*2+1] = sUv.getY(idx);

                // Distribución de nacimientos sesgada para empezar lento y terminar en avalancha
                birth[i] = Math.pow(Math.random(), 1.1) * 0.85; 
            }

            pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            pGeo.setAttribute('aVoidPos', new THREE.BufferAttribute(voidPos, 3));
            pGeo.setAttribute('normalMap', new THREE.BufferAttribute(norm, 3));
            pGeo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
            pGeo.setAttribute('aBirthTime', new THREE.BufferAttribute(birth, 1));

            particleSystem = new THREE.Points(pGeo, shaderMaterial);
            scene.add(particleSystem);
        }

        function animate(now) {
            requestAnimationFrame(animate);

            if(controls) controls.update();

            if(isEngineReady && shaderMaterial) {
                if(assemblyStartTime === null) assemblyStartTime = now;

                const elapsed = (now - assemblyStartTime);
                const normalizedTime = Math.min(elapsed / ASSEMBLY_DURATION, 1.0);
                
                shaderMaterial.uniforms.uGlobalTime.value = normalizedTime;

                const t = now * 0.0004;
                shaderMaterial.uniforms.uLight.value.set(Math.sin(t)*1.8, 1.2, Math.cos(t)*1.8);

                if(mouseMesh) {
                    raycaster.setFromCamera(mouse, camera);
                    const hits = raycaster.intersectObject(mouseMesh);
                    if(hits.length > 0) {
                        shaderMaterial.uniforms.uMousePos.value.copy(hits[0].point);
                    } else {
                        shaderMaterial.uniforms.uMousePos.value.set(9999,9999,9999);
                    }
                }
            }

            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
