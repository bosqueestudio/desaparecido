 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vostok Studio - Data Art: Desaparecidos</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #030303; color: #eeeeee; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-panel { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(10, 10, 10, 0.85); padding: 25px; border: 1px solid #222; border-radius: 4px; width: 320px; backdrop-filter: blur(10px); }
        h1 { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: #fff; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; color: #888; }
        input[type="number"], input[type="file"] { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 8px; box-sizing: border-box; font-family: monospace; }
        .data-stat { font-size: 32px; font-weight: normal; color: #fff; margin: 10px 0; font-family: monospace; }
        .footer-note { font-size: 10px; color: #555; margin-top: 20px; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h1>Vostok Studio // Data Engine</h1>
        
        <div class="control-group">
            <label>Cifra Oficial (Partículas)</label>
            <div class="data-stat" id="displayCount">114,000</div>
            <input type="number" id="dataInput" value="114000" min="1">
        </div>

        <div class="control-group">
            <label>Subir Geometría (.OBJ)</label>
            <input type="file" id="objUpload" accept=".obj">
        </div>

        <div class="footer-note">
            Cada punto representa un registro individual en la base de datos de desaparecidos de México.
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>

    <script>
        // ==========================================
        // VOSTOK STUDIO - CORE ENGINE
        // ==========================================
        
        let scene, camera, renderer, controls, particleSystem;
        const canvasContainer = document.getElementById('canvas-container');
        
        // Settings
        let targetParticles = 114000;

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x030303, 0.003); // Niebla para dar profundidad y misterio

            // 2. Camera Setup
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 150);

            // 3. Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            canvasContainer.appendChild(renderer.domElement);

            // 4. Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true; 
            controls.autoRotateSpeed = 0.5; // Rotación lenta y solemne

            // 5. Generar un objeto inicial (Placeholder procedural)
            generatePlaceholderGeometry();

            // 6. Listeners
            window.addEventListener('resize', onWindowResize, false);
            setupUI();

            // 7. Loop
            animate();
        }

        // Sistema de inyección de geometría por defecto si no suben nada
        function generatePlaceholderGeometry() {
            // Un torso básico simulando la caja torácica / jersey
            const geometry = new THREE.TorusKnotGeometry(20, 8, 100, 16);
            buildParticleSystem(geometry, targetParticles);
        }

        // Construcción de los puntos
        function buildParticleSystem(baseGeometry, count) {
            if (particleSystem) scene.remove(particleSystem);

            // Extraer vértices de la geometría original
            let positions = [];
            
            // Manejar BufferGeometry
            if (baseGeometry.isBufferGeometry) {
                const posAttribute = baseGeometry.attributes.position;
                for (let i = 0; i < posAttribute.count; i++) {
                    positions.push(
                        new THREE.Vector3(posAttribute.getX(i), posAttribute.getY(i), posAttribute.getZ(i))
                    );
                }
            }

            // Crear nueva geometría para las partículas exactas
            const particlesGeometry = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(count * 3);
            const originalVertCount = positions.length;

            for (let i = 0; i < count; i++) {
                // Seleccionar un vértice aleatorio como punto base
                const baseVertex = positions[Math.floor(Math.random() * originalVertCount)];
                
                // Añadir un pequeño "ruido" (dispersión) para que las partículas ocupen volumen, no solo la cáscara
                const noise = 0.5; 
                const px = baseVertex.x + (Math.random() - 0.5) * noise;
                const py = baseVertex.y + (Math.random() - 0.5) * noise;
                const pz = baseVertex.z + (Math.random() - 0.5) * noise;

                particlePositions[i * 3] = px;
                particlePositions[i * 3 + 1] = py;
                particlePositions[i * 3 + 2] = pz;
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

            // Material: Blanco ceniza, casi humo.
            const particlesMaterial = new THREE.PointsMaterial({
                color: 0xdddddd,
                size: 0.15,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending, // Brillo aditivo
                depthWrite: false
            });

            particleSystem = new THREE.Points(particlesGeometry, particlesMaterial);
            
            // Centrar el modelo en la pantalla
            particlesGeometry.computeBoundingBox();
            const center = new THREE.Vector3();
            particlesGeometry.boundingBox.getCenter(center);
            particleSystem.position.sub(center);

            scene.add(particleSystem);
        }

        // Lógica de Interfaz y Subida de Archivos
        function setupUI() {
            const dataInput = document.getElementById('dataInput');
            const displayCount = document.getElementById('displayCount');
            const objUpload = document.getElementById('objUpload');

            // Actualizar número de partículas
            dataInput.addEventListener('change', (e) => {
                targetParticles = parseInt(e.target.value);
                displayCount.innerText = targetParticles.toLocaleString();
                // Reconstruir sistema con la última geometría cargada o placeholder
                if (particleSystem) {
                    // truco rápido: simplemente extraemos los vertices del sistema actual para redistribuir
                    const tempGeo = new THREE.BufferGeometry();
                    tempGeo.setAttribute('position', particleSystem.geometry.attributes.position);
                    buildParticleSystem(tempGeo, targetParticles);
                }
            });

            // Lógica para parsear OBJ localmente sin backend
            objUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    const contents = event.target.result;
                    
                    const loader = new THREE.OBJLoader();
                    const object = loader.parse(contents);
                    
                    // Combinar todas las geometrías del OBJ en una sola si tiene varias mallas
                    const geometries = [];
                    object.traverse((child) => {
                        if (child.isMesh) {
                            geometries.push(child.geometry);
                        }
                    });

                    if (geometries.length > 0) {
                        // Usamos la primera malla para simplificar en este MVP
                        const mainGeometry = geometries[0];
                        // Escalar el modelo si viene muy grande o pequeño (ajuste heurístico)
                        mainGeometry.scale(10, 10, 10);
                        buildParticleSystem(mainGeometry, targetParticles);
                    }
                };
                reader.readAsText(file);
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Iniciar motor
        window.onload = init;
    </script>
</body>
</html>
